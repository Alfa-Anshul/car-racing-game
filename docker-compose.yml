version: '3.9'
services:
  backend:
    build: ./backend
    environment:
      - DATABASE_URL=sqlite:///./turborace.db
      - SECRET_KEY=turborace-supersecret-key
    volumes:
      - backend_data:/app
    restart: unless-stopped
  frontend:
    build: ./frontend
    depends_on:
      - backend
    restart: unless-stopped
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
volumes:
  backend_data:
